<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250">
  <rect width="1200" height="250" fill="black"/>

  <!-- Left Side Icons -->
  <g>
    <!-- Terminal Icon (Left) -->
    <g transform="translate(180, 120) scale(1.6) rotate(-15)">
      <rect x="-40" y="-30" width="80" height="60" rx="8" fill="none" stroke="#ffffff" stroke-width="10"/>
      <path d="M-20,-10 L-10,0 L-20,10" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-5" y1="12" x2="20" y2="12" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- Network Icon (Bottom Left) -->
    <g transform="translate(350, 190) scale(1.3) rotate(10)">
      <circle cx="-30" cy="-25" r="15" fill="#ffffff"/>
      <circle cx="30" cy="-25" r="15" fill="#ffffff"/>
      <circle cx="0" cy="25" r="15" fill="#ffffff"/>
      <line x1="-30" y1="-25" x2="0" y2="25" stroke="#ffffff" stroke-width="10"/>
      <line x1="30" y1="-25" x2="0" y2="25" stroke="#ffffff" stroke-width="10"/>
      <line x1="-30" y1="-25" x2="30" y2="-25" stroke="#ffffff" stroke-width="10"/>
    </g>
    
    <!-- AC/DC Bolt (Top Left-ish) -->
    <g transform="translate(450, 70) scale(1.8) rotate(25)">
      <path d="M12,-35 L-20,5 L-2,5 L-12,35 L20,-5 L2,-5 Z" fill="#ffffff"/>
    </g>
  </g>

  <!-- Right Side Icons -->
  <g>
    <!-- AC/DC Bolt (Right) -->
    <g transform="translate(1000, 130) scale(2.5) rotate(-15)">
      <path d="M12,-35 L-20,5 L-2,5 L-12,35 L20,-5 L2,-5 Z" fill="#ffffff"/>
    </g>

    <!-- Terminal Icon (Top Right) -->
    <g transform="translate(850, 70) scale(1.3) rotate(20)">
      <rect x="-40" y="-30" width="80" height="60" rx="8" fill="none" stroke="#ffffff" stroke-width="10"/>
      <path d="M-20,-10 L-10,0 L-20,10" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-5" y1="12" x2="20" y2="12" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- Network Icon (Bottom Right) -->
    <g transform="translate(730, 200) scale(1.5) rotate(-20)">
      <circle cx="-30" cy="-25" r="15" fill="#ffffff"/>
      <circle cx="30" cy="-25" r="15" fill="#ffffff"/>
      <circle cx="0" cy="25" r="15" fill="#ffffff"/>
      <line x1="-30" y1="-25" x2="0" y2="25" stroke="#ffffff" stroke-width="10"/>
      <line x1="30" y1="-25" x2="0" y2="25" stroke="#ffffff" stroke-width="10"/>
    </g>
  </g>
  
  <!-- Scattered smaller background icons (sharp, but dimmer color for depth) -->
  <g>
    <!-- Tiny bolts -->
    <g transform="translate(100, 50) scale(1.0) rotate(45)"><path d="M12,-35 L-20,5 L-2,5 L-12,35 L20,-5 L2,-5 Z" fill="#666666"/></g>
    <g transform="translate(1120, 210) scale(1.2) rotate(-45)"><path d="M12,-35 L-20,5 L-2,5 L-12,35 L20,-5 L2,-5 Z" fill="#666666"/></g>
    <!-- Tiny terminal -->
    <g transform="translate(520, 210) scale(1.0) rotate(-5)">
      <rect x="-40" y="-30" width="80" height="60" rx="8" fill="none" stroke="#666666" stroke-width="10"/>
      <path d="M-20,-10 L-10,0 L-20,10" fill="none" stroke="#666666" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-5" y1="12" x2="20" y2="12" stroke="#666666" stroke-width="10" stroke-linecap="round"/>
    </g>
    <!-- Tiny network -->
    <g transform="translate(630, 60) scale(0.9) rotate(35)">
      <circle cx="-30" cy="-25" r="15" fill="#666666"/>
      <circle cx="30" cy="-25" r="15" fill="#666666"/>
      <circle cx="0" cy="25" r="15" fill="#666666"/>
      <line x1="-30" y1="-25" x2="0" y2="25" stroke="#666666" stroke-width="10"/>
      <line x1="30" y1="-25" x2="0" y2="25" stroke="#666666" stroke-width="10"/>
      <line x1="-30" y1="-25" x2="30" y2="-25" stroke="#666666" stroke-width="10"/>
    </g>
  </g>
</svg>
